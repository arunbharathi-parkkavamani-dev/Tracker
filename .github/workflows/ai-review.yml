name: AI Code Review

on:
  push:
    branches:
      - main
      - Arun
      - staging
      - ai-review
  pull_request:
    branches:
      - main
      - Arun
      - staging
      - ai-review

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai

      - name: Generate AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node <<'EOF'
          import fs from 'fs';
          import { execSync } from 'child_process';
          import OpenAI from 'openai';

          if (!process.env.OPENAI_API_KEY) {
            throw new Error('OPENAI_API_KEY secret is missing');
          }

          const openai = new OpenAI({
            apiKey: process.env.OPENAI_API_KEY,
            baseURL: 'https://openrouter.ai/api/v1'
          });

          // -----------------------------
          // Get diff (smaller + safer)
          // -----------------------------
          let content = '';

          const commitCount = parseInt(
            execSync('git rev-list --count HEAD', { encoding: 'utf8' }).trim(),
            10
          );

          if (commitCount > 1) {
            content = execSync(
              'git diff --unified=3 HEAD~1 HEAD | head -c 20000',
              { encoding: 'utf8' }
            );
          } else {
            content = execSync(
              'git show HEAD | head -c 20000',
              { encoding: 'utf8' }
            );
          }

          if (!content || content.trim().length === 0) {
            console.log("No changes detected");
            process.exit(0);
          }

          // -----------------------------
          // Chunking (prevents token overflow)
          // -----------------------------
          function chunkText(text, size = 12000) {
            const chunks = [];
            for (let i = 0; i < text.length; i += size) {
              chunks.push(text.slice(i, i + size));
            }
            return chunks;
          }

          const chunks = chunkText(content, 12000);
          let fullReview = '';

          for (let i = 0; i < chunks.length; i++) {
            const chunk = chunks[i];

            console.log(`Reviewing chunk ${i + 1}/${chunks.length}`);

            const response = await openai.chat.completions.create({
              model: "google/gemini-2.5-flash",
              messages: [
                {
                  role: "system",
                  content: "You are a senior software engineer reviewing code."
                },
                {
                  role: "user",
                  content: `
                  Review PART ${i + 1}/${chunks.length}.

                  Focus only on this section.

                  Code:
                  ${chunk}
                  `
                }
              ],
              temperature: 0.3,
              max_tokens: 1200
            });

            fullReview += `\n\n### Part ${i + 1}\n` +
              response.choices[0].message.content;
          }

          // -----------------------------
          // Save output
          // -----------------------------
          const date = new Date().toLocaleString();
          const output = `\n\n---\n### 🧠 AI Review (${date})\n${fullReview}\n`;

          fs.appendFileSync('./text.md', output);
          EOF

      - name: Commit and push review file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add text.md
          git diff --cached --quiet && exit 0
          git commit -m "🤖 AI code review update"
          git push