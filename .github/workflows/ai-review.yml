name: AI Code Review

on:
  push:
    branches:
      - main
      - Arun
      - staging
      - ai-review
  pull_request:
    branches:
      - main
      - Arun
      - staging
      - ai-review

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai

      - name: Generate AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node <<'EOF'
          import fs from 'fs';
          import { execSync } from 'child_process';
          import OpenAI from 'openai';

          const openai = new OpenAI({
            apiKey: process.env.OPENROUTER_API_KEY,
            baseURL: 'https://openrouter.ai/api/v1'
          });

          // Detect if we're in the ai-review branch
          const branch = execSync('git rev-parse --abbrev-ref HEAD', { encoding: 'utf8' }).trim();
          let content = '';

          if (branch.includes('review')) {
            // console.log('📦 Performing full project review...');
            // Get all project files except node_modules
            const files = execSync('find . -type f ! -path "./node_modules/*" ! -path "./.git/*" -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx"', { encoding: 'utf8' });
            const limitedFiles = files.split('\n').slice(0, 20).join('\n'); // Limit for large projects
            content = execSync(`cat ${limitedFiles}`, { encoding: 'utf8', maxBuffer: 1024 * 1000 });
          } else {
            // console.log('🧩 Performing diff-based review...');
            const commitCount = parseInt(execSync('git rev-list --count HEAD', { encoding: 'utf8' }).trim(), 10);
            if (commitCount > 1) {
              content = execSync('git diff HEAD~1 HEAD', { encoding: 'utf8', maxBuffer: 50 * 1024 * 1024 });
            } else {
              content = execSync('git show HEAD', { encoding: 'utf8', maxBuffer: 50 * 1024 * 1024 });
            }
          }

          const MAX_CHARS = 120000;
          if (content.length > MAX_CHARS) {
            content = content.slice(0, MAX_CHARS);
          }

          const prompt = `
          Act as a Staff Software Engineer.

          Review this code change and provide:

          # Overview

          Short summary.

          # Positives

          What is implemented well.

          # Issues

          Only real bugs, security risks, performance problems,
          architecture concerns, race conditions,
          memory leaks, maintainability issues.

          # Suggestions

          Actionable improvements.

          # Risk Level

          Low / Medium / High

          Code:

          ${content}
          `;
          const runReview = async () => {
            const response = await openai.chat.completions.create({
              model: "google/gemini-2.5-flash",
              messages: [
                { role: "system", content: "You are an expert code reviewer and software architect." },
                { role: "user", content: prompt }
              ],
              temperature: 0.4,
            });

            const review = response.choices[0].message.content;
            const date = new Date().toLocaleString();
            const output = `\n\n---\n### 🧠 AI Review (${date})\n${review}\n`;

            fs.appendFileSync('./text.md', output);
            // console.log('✅ Review added to text.md');
          };

          await runReview();
          EOF

      - name: Commit and push review file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add text.md
          git diff --cached --quiet && exit 0
          git commit -m "🤖 AI code review update"
          git push
